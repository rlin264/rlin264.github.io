<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f5f2" />
    <meta
      name="description"
      content="LinBox - Personal thoughts and technical writings"
    />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph meta tags for better social sharing -->
    <meta property="og:title" content="LinBox" />
    <meta property="og:description" content="Personal thoughts and technical writings" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rlin264.github.io" />

    <!-- Twitter Card meta tags -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="LinBox" />
    <meta name="twitter:description" content="Personal thoughts and technical writings" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <title>LinBox</title>

    <link rel="stylesheet" href="/src/index.css">
    <style>
      .loading-fallback {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #f7f5f2;
        font-family: 'Courier Prime', 'Courier New', monospace;
        font-size: 13px;
        color: #aaa;
        letter-spacing: 1px;
      }
      #root:not(:empty) ~ .loading-fallback {
        display: none;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Loading fallback -->
    <div class="loading-fallback">loading...</div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
